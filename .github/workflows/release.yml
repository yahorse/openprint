name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to attach binaries to (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            sep: ":"
            strip: "--strip"
          - os: macos-13
            target: macos-intel
            sep: ":"
            strip: "--strip"
          - os: macos-latest
            target: macos-arm64
            sep: ":"
            strip: "--strip"
          - os: windows-latest
            target: windows-amd64
            sep: ";"
            strip: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install .
          pip install pyinstaller

      - name: Build standalone binary
        shell: bash
        run: |
          pyinstaller --onefile --name opp ${{ matrix.strip }} --noconfirm \
            --add-data "src/openprint/static${{ matrix.sep }}openprint/static" \
            --hidden-import openprint.cli.main \
            --hidden-import openprint.server \
            --hidden-import openprint.bridge \
            --hidden-import openprint.testkit \
            --hidden-import openprint.backends.cups \
            --hidden-import openprint.backends.ipp \
            --hidden-import openprint.backends.dummy \
            --hidden-import openprint.dashboard \
            --hidden-import openprint.resilience \
            --hidden-import openprint.scanner \
            --hidden-import openprint.store \
            --hidden-import openprint.tls \
            --hidden-import openprint.progress \
            --collect-submodules openprint \
            src/openprint/cli/__main__.py

      - name: Rename artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.target }}" = "windows-amd64" ]; then
            mv opp.exe opp-${{ matrix.target }}.exe
          else
            mv opp opp-${{ matrix.target }}
          fi
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opp-${{ matrix.target }}
          path: dist/opp-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*
          body: |
            ## Install

            ### Download a binary (no Python needed)

            | Platform | Download |
            |---|---|
            | **Linux (x86_64)** | `opp-linux-amd64` |
            | **macOS (Apple Silicon)** | `opp-macos-arm64` |
            | **macOS (Intel)** | `opp-macos-intel` |
            | **Windows** | `opp-windows-amd64.exe` |

            ```bash
            # Linux / macOS
            chmod +x opp-*
            ./opp-linux-amd64 discover

            # Windows
            opp-windows-amd64.exe discover
            ```

            ### Or install with pip

            ```bash
            pip install openprint
            ```

  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
        continue-on-error: true
